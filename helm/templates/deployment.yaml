apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claworc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claworc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "claworc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claworc.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "claworc.serviceAccountName" . }}
      containers:
        - name: claworc
          image: "claworc/claworc:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            {{- if .Values.sshGateway.enabled }}
            - name: ssh
              containerPort: {{ .Values.sshGateway.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: CLAWORC_DATA_PATH
              value: {{ .Values.config.dataPath | quote }}
            {{- if .Values.config.backupsPath }}
            - name: CLAWORC_BACKUPS_PATH
              value: {{ .Values.config.backupsPath | quote }}
            {{- end }}
            - name: CLAWORC_K8S_NAMESPACE
              value: {{ .Values.config.k8sNamespace | quote }}
            - name: CLAWORC_SSH_GATEWAY_ENABLED
              value: {{ .Values.sshGateway.enabled | quote }}
            {{- if .Values.sshGateway.enabled }}
            - name: CLAWORC_SSH_GATEWAY_PORT
              value: {{ .Values.sshGateway.port | quote }}
            {{- if .Values.sshGateway.publicHost }}
            - name: CLAWORC_SSH_GATEWAY_PUBLIC_HOST
              value: {{ .Values.sshGateway.publicHost | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.database.existingSecret }}
            - name: CLAWORC_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: url
            {{- else if .Values.database.url }}
            - name: CLAWORC_DATABASE
              value: {{ .Values.database.url | quote }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            {{- if and .Values.backupsPersistence.enabled .Values.config.backupsPath }}
            - name: backups
              mountPath: {{ .Values.config.backupsPath | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "claworc.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and .Values.backupsPersistence.enabled .Values.config.backupsPath }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "claworc.fullname" . }}-backups
        {{- end }}
