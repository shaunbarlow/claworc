replicaCount: 1

# Extra environment variables passed to the control-plane container.
# Map of name -> value. Values are quoted in the rendered manifest.
# Useful for toggling settings like CLAWORC_AUTH_DISABLED in test installs.
extraEnv: {}

config:
  dataPath: /app/data
  # backupsPath: when set, backup archives are stored here instead of under
  # <dataPath>/backups. Useful for directing backups to cheaper/slower storage.
  # Set together with backupsPersistence.enabled=true to back this path with a
  # separate PVC.
  backupsPath: ""
  k8sNamespace: claworc

# External database. When unset, the chart preserves the default behavior:
# SQLite stored on the data PVC. Setting database.url (or database.existingSecret
# pointing at a Secret with a "url" key) switches the control plane to the
# external database. The data PVC is still mounted because /app/data also
# stores SSH keys, backup staging, and other on-disk artifacts.
#
# URL format (see docs/databases.md):
#   sqlite:///abs/path/main.db
#   postgres://user:pass@host:5432/dbname?sslmode=require
#   mysql://user:pass@host:3306/dbname            (mariadb:// also works)
database:
  url: ""
  existingSecret: ""           # Secret name with key "url"; takes precedence over url

service:
  type: NodePort
  port: 8001
  nodePort: 30000

# Inbound SSH gateway: lets users `ssh <user>+<agent-name>@<host>` and be
# bridged to that agent. publicHost is display-only (the hostname shown in
# the UI's usage snippet). Exposing the service port beyond the cluster
# (LoadBalancer, ingress TCP passthrough) is environment-specific.
sshGateway:
  enabled: true
  port: 2222
  servicePort: 2222
  nodePort: ""
  publicHost: ""

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Optional separate PVC for backup archives. Requires config.backupsPath to be
# set to the mount path (e.g. /app/backups). Leave disabled to keep backups on
# the main data volume.
backupsPersistence:
  enabled: false
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}
