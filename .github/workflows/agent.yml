name: Build and Push Agent Image

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install test dependencies
        run: make install-test

      # FORK-ONLY: image names overridden to the shaunbarlow Docker Hub
      # namespace (make command-line overrides beat the Makefile's `:=`
      # assignments). Drop this commit before PRing upstream.
      - name: Build, test, and push agent images
        run: |
          make agent-ci \
            AGENT_IMAGE=shaunbarlow/openclaw \
            BROWSER_BASE_IMAGE=shaunbarlow/base-browser \
            BROWSER_CHROMIUM_IMAGE=shaunbarlow/chromium-browser \
            BROWSER_CHROME_IMAGE=shaunbarlow/chrome-browser \
            BROWSER_BRAVE_IMAGE=shaunbarlow/brave-browser
        env:
          CACHE_ARGS: --cache-from type=gha,scope=agent --cache-to type=gha,mode=max,scope=agent

      - name: Build, test, and push stable agent image
        run: |
          make agent-stable-ci \
            STABLE_IMAGE=shaunbarlow/claworc-stable \
            STABLE_MIRROR_IMAGE=shaunbarlow/openclaw-stable
        env:
          CACHE_ARGS: --cache-from type=gha,scope=agent-stable --cache-to type=gha,mode=max,scope=agent-stable
